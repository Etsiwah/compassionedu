services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────────
  - type: web
    name: compassionedu-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: compassionedu-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: UPLOAD_DIR
        value: uploads
      - key: ALLOWED_ORIGINS
        value: https://compassionedu.vercel.app
      - key: PORT
        value: 4000

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: compassionedu-db
    databaseName: compassion_edu
    user: compassion_user
    plan: free
